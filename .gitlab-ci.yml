include:
  - project: 'Web-Projects/pipeline-scripts'
    ref: master
    file: '/templates/security.yml'

workflow:
  rules:
    - if: $CI_MERGE_REQUEST_ID || $CI_MERGE_REQUEST_EVENT_TYPE
      when: never
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
    - when: never

stages:
  - test
  - push image
  - security

variables:
  SEC_CS_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG
  SEC_CS_DOCKERFILE_PATH: Dockerfile
  DEFECTDOJO_PRODUCT_TYPE: "CDB"

test:
  image: python:3.8
  tags:
    - kube-dev
  before_script:
    - pip install --upgrade pip
    - pip install uv
    - uv sync --frozen --no-cache
    - uv pip install pytest coverage coveralls
  script:
    - uv run coverage run --source=. -m pytest -v
    - uv run coverage html
    - mv htmlcov/ public/\
    - uv run coverage report
  coverage: '/TOTAL.+ ([0-9]{1,3}%)/'
  artifacts:
    paths:
      - public
    expire_in: 30 days

docker build:
  image: docker:24.0.9-git
  tags:
    - docker
  stage: push image
  only:
    - tags
  script:
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
    - LATEST_MASTER_COMMIT=$(git log -n 1 origin/master --pretty=format:"%H")
    - if [ "$LATEST_MASTER_COMMIT" = "$CI_COMMIT_SHA" ]; then EXTRA_TAGS="-t $CI_REGISTRY_IMAGE:latest"; fi
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG $EXTRA_TAGS .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG
    - if [ "$LATEST_MASTER_COMMIT" = "$CI_COMMIT_SHA" ]; then docker push $CI_REGISTRY_IMAGE:latest; fi
