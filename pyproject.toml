    "importlib-metadata>=9.0.0,<10",
    "flower==2.0.1,<3",
    "requests>=2.34.*,<3",
    "urllib3>=2.7.0,<3",
    "pymongo>=4.17.0,<5",
    "lxml>=6.1.1,<7",
    "aiohttp>=3.14.0,<4",
    "python-dateutil>=2.9.0,<3",
    "pytz>=2026.2",
    "pyyaml>=6.0.3,<7",
    "python-json-logger>=2.0.2,<3",
    "Jinja2>=3.1.6,<4",
    "MarkupSafe>=3.0.3,<4",
    "itsdangerous>=2.2.0,<3",
    "tornado>=6.5.7,<7.0.0",
    "sentry-sdk>=2.62.0,<3",
